<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pendências — CRM Agêntico Empresa X</title>
<link rel="stylesheet" href="css/styles.css">
</head>
<body data-page="compromissos">
  <div class="app-shell" id="shell-root">
    <div class="main-area">
      <div id="topbar-root"></div>

      <div class="page-header">
        <div>
          <div class="type-h1">Pendências</div>
          <div class="type-body-sm">O que foi combinado com o cliente e ainda precisa ser cumprido.</div>
        </div>
        <div class="page-header-actions">
          <div class="segmented" id="commitments-segmented">
            <button data-view="etapa" class="active">Por Etapa</button>
            <button data-view="cliente">Por Cliente</button>
          </div>
        </div>
      </div>

      <main class="page-content">
        <div class="card-grid" id="commitments-summary-root" style="margin-bottom: var(--space-6);"></div>
        <div id="commitments-view-root"></div>
      </main>
    </div>
  </div>

  <script src="js/data.js"></script>
  <script src="js/ai-engine.js"></script>
  <script src="js/layout.js"></script>
  <script src="js/compromissos.js"></script>
  <script>initShell();</script>
</body>
</html>
